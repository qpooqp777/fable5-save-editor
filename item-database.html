*{margin:0;padding:0;box-sizing:border-box}

.header{background:#1e293b;border-bottom:2px solid #334155;padding:16px 20px;text-align:center}

.search-wrap{position:relative;flex:1 1 300px;min-width:200px}

.filters button.active{background:#f59e0b;color:#1e293b;border-color:#f59e0b;font-weight:bold}
.stats{max-width:900px;margin:12px auto 0;padding:0 16px;font-size:13px;color:#64748b;text-align:right}

.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#fcd34d}
.card-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.card-icon{width:48px;height:48px;background:#0f172a;border:1px solid #334155;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}.card-icon img.item-icon{width:44px;height:44px;object-fit:contain;image-rendering:pixelated}
.card-name{font-size:16px;font-weight:bold;color:#fff}
.card-id{font-size:11px;color:#64748b;font-family:monospace}
.card-legend{font-size:11px;background:#92400e;color:#fde68a;padding:2px 8px;border-radius:6px;margin-left:8px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.tag{font-size:11px;padding:2px 7px;border-radius:5px;background:#334155;color:#94a3b8}
.tag-type{background:#1e3a5f;color:#bfdbfe}
.card-stats{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:13px;color:#cbd5e1;margin-top:4px}
.card-stats b{color:#94a3b8;font-weight:normal;margin-right:3px}
/* Detail Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(2,6,23,.85);align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{width:min(520px,96vw);max-height:88vh;background:#0f172a;border:1px solid #475569;border-radius:14px;padding:20px;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}

.modal-title{font-size:20px;font-weight:bold;color:#fff}
.modal-id{font-size:12px;color:#64748b;font-family:monospace}
.modal-close{margin-left:auto;width:34px;height:34px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;border-radius:8px;cursor:pointer;font-size:16px;flex-shrink:0}
.modal-close:active{background:#334155}
.modal-desc{font-size:13px;color:#cbd5e1;line-height:1.7;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.detail-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px}
.detail-table td{padding:5px 8px;border-bottom:1px solid #1e293b;vertical-align:top}
.detail-table .lbl{color:#94a3b8;white-space:nowrap;width:90px}
.detail-table .val{color:#e2e8f0}
.search-nav{margin-top:16px;display:flex;gap:8px;justify-content:center}
.search-nav button{padding:8px 18px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:13px}

// ===== INDEX =====
let activeType = 'all';
let searchQ = '';
let filteredKeys = [];
let favorites = JSON.parse(localStorage.getItem('f5_favorites') || '{}');
function saveFav() { localStorage.setItem('f5_favorites', JSON.stringify(favorites)); }
function toggleFav(k) { if (favorites[k]) delete favorites[k]; else favorites[k] = true; saveFav(); applyFilter(); }
function isFav(k) { return !!favorites[k]; }

function buildIndex() {
  const keys = Object.keys(ITEMS).filter(k => ITEMS[k] && ITEMS[k].n);
  filteredKeys = keys;
  updateStats(keys);
  renderCards(keys);
}

function applyFilter() {
  let keys = Object.keys(ITEMS).filter(k => ITEMS[k] && ITEMS[k].n);
  if (activeType === 'legend') keys = keys.filter(k => ITEMS[k].legend);
  else if (activeType === 'fav') keys = keys.filter(k => isFav(k));
  else if (activeType !== 'all') keys = keys.filter(k => (ITEMS[k].type||'') === activeType);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    keys = keys.filter(k => {
      const d = ITEMS[k];
      return d.n.toLowerCase().indexOf(q) >= 0 || k.toLowerCase().indexOf(q) >= 0;
    });
  }
  // sort: weapons/armor first, then by name
  const typeOrder = {wpn:0,arm:1,acc:2,skillbk:3,pot:4,scroll:5,misc:6,etc:7};
  keys.sort((a,b) => {
    const ta = typeOrder[ITEMS[a].type]??8, tb = typeOrder[ITEMS[b].type]??8;
    if (ta !== tb) return ta - tb;
    return ITEMS[a].n.localeCompare(ITEMS[b].n, 'zh-TW');
  });
  filteredKeys = keys;
  updateStats(keys);
  renderCards(keys);
}

function updateStats(keys) {
  document.getElementById('stats').textContent = '共 ' + keys.length + ' / ' + Object.keys(ITEMS).filter(k=>ITEMS[k]&&ITEMS[k].n).length + ' 件物品';
}

function esc(s) { return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function sgn(v) { return (v>0?'+':'')+v; }
function hl(text, q) {
  if (!q) return esc(text);
  const s = esc(text), low = s.toLowerCase(), eq = q.toLowerCase();
  let out = '', i = 0, idx;
  while ((idx = low.indexOf(eq, i)) >= 0) {
    out += s.slice(i, idx) + '<span class="hl">' + s.slice(idx, idx+eq.length) + '</span>';
    i = idx + eq.length;
  }
  return out + s.slice(i);
}

function getSlotName(d) {
  if (d.slot) return SLOT_LABEL[d.slot] || d.slot;
  if (d.type === 'wpn') {
    if (d.w2h || d.twohanded) return '雙手武器';
    if (d.isBow) return '弓';
    if (d.isArrow) return '箭';
    return '單手武器';
  }
  return '';
}

function getWeaponTraits(d) {
  if (d.type !== 'wpn') return '';
  const traits = [];
  if (d.eff && EFF_LABEL[d.eff]) traits.push(EFF_LABEL[d.eff]);
  if (d.rapidfire) traits.push('連射');
  if (d.unBonus) traits.push('對不死／狼人額外傷害');
  // tag-based traits (we can't call getWeaponTags outside game, use heuristics)
  if (d.eff !== 'combo' && d.eff !== 'cleave' && d.eff !== 'crush' && d.eff !== 'pierce') {
    if (d.spd >= 0.7 && d.spd <= 0.9 && (d.req||'').indexOf('dark')>=0) traits.push('連擊(鋼爪)');
  }
  return traits.join('、');
}

function cardHTML(k, d) {
  const icon = itemIconHTML(d, 'item-icon');
  const slot = getSlotName(d);
  const tags = [];
  tags.push('<span class="tag tag-type">' + esc(TYPE_LABEL[d.type]||d.type) + '</span>');
  if (slot) tags.push('<span class="tag">' + esc(slot) + '</span>');
  if (d.legend) tags.push('<span class="tag" style="background:#92400e;color:#fde68a">傳說</span>');
  if (d.req) tags.push('<span class="tag">' + esc((d.req||'').split(',').map(r=>REQ_LABEL[r]||r).join('／')) + '</span>');

  const stats = [];
  if (d.type === 'wpn') {
    if (d.dmgS != null) stats.push('<span><b>攻擊</b> ' + d.dmgS + '~' + d.dmgL + (d.dmgL!==d.dmgS?'<small>(大/小)</small>':'') + '</span>');
    if (d.dmgBonus) stats.push('<span><b>額外傷害</b> +' + d.dmgBonus + '</span>');
    if (d.hit) stats.push('<span><b>命中</b> ' + sgn(d.hit) + '</span>');
    if (d.mdmg) stats.push('<span><b>魔法傷害</b> ' + sgn(d.mdmg) + '</span>');
    if (d.spd) stats.push('<span><b>速度</b> ' + d.spd + '</span>');
    const wt = getWeaponTraits(d);
    if (wt) stats.push('<span><b>特性</b> ' + esc(wt) + '</span>');
  } else if (d.ac != null) {
    stats.push('<span><b>防禦(AC)</b> ' + sgn(-d.ac) + '</span>');
  }
  Object.keys(STAT_LABEL).forEach(s => { if (d[s]) stats.push('<span><b>'+STAT_LABEL[s]+'</b> '+sgn(d[s])+'</span>'); });
  if (d.mr) stats.push('<span><b>魔防</b> ' + sgn(d.mr) + '</span>');
  if (d.mhp) stats.push('<span><b>HP上限</b> '+sgn(d.mhp)+'</span>');
  if (d.mmp) stats.push('<span><b>MP上限</b> '+sgn(d.mmp)+'</span>');

  const starCls = isFav(k) ? 'fav-btn active' : 'fav-btn';
  const starChar = isFav(k) ? '❤' : '♡';
  return '<div class="card" data-id="' + esc(k) + '">' +
    '<div class="card-head">' +
      '<div class="card-icon">' + icon + '</div>' +
      '<div style="flex:1;min-width:0"><div class="card-name">' + hl(d.n, searchQ) + (d.legend?'<span class="card-legend">⭐ 傳說</span>':'') + '</div>' +
      '<div class="card-id">' + esc(k) + '</div>' +
      '<div class="card-tags">' + tags.join('') + '</div></div>' +
      '<button class="' + starCls + '" data-fav="' + esc(k) + '" title="加入最愛">' + starChar + '</button>' +
    '</div>' +
    (stats.length ? '<div class="card-stats">' + stats.join('') + '</div>' : '') +
  '</div>';
}

function renderCards(keys) {
  const el = document.getElementById('results');
  if (!keys.length) {
    el.innerHTML = '<div class="no-results">找不到符合的物品</div>';
    return;
  }
  el.innerHTML = keys.map(k => cardHTML(k, ITEMS[k])).join('');
}

// ===== DETAIL MODAL =====
function showDetail(k) {
  const d = ITEMS[k];
  if (!d) return;
  const icon = itemIconHTML(d, 'item-icon');
  const rows = [];
  function add(l,v) { if (v!==undefined && v!==null && v!=='') rows.push('<tr><td class="lbl">'+esc(l)+'</td><td class="val">'+esc(String(v))+'</td></tr>'); }

  add('類型', TYPE_LABEL[d.type] || d.type);
  if (d.slot) add('部位', SLOT_LABEL[d.slot] || d.slot);
  if (d.req) add('需求職業', (d.req||'').split(',').map(r=>REQ_LABEL[r]||r).join('／'));
  if (d.legend) add('稀有度', '⭐ 傳說');
  if (d.safe != null) add('安定值', d.safe);

  if (d.type === 'wpn') {
    if (d.w2h || d.twohanded) add('持用', '雙手武器');
    if (d.isBow || d.ranged) add('射程', '遠距離');
    if (d.isArrow) add('箭', '是');
    if (d.dmgS != null) add('攻擊力', '對小型 '+d.dmgS+'／對大型 '+d.dmgL);
    if (d.dmgBonus) add('額外傷害', sgn(d.dmgBonus));
    if (d.hit) add('命中', sgn(d.hit));
    if (d.mdmg) add('魔法傷害', sgn(d.mdmg));
    if (d.spd) add('攻擊速度', d.spd);
    const wt = getWeaponTraits(d);
    if (wt) add('武器特性', wt);
  } else if (d.ac != null) {
    add('防禦(AC)', sgn(-d.ac));
  }
  if (d.slot==='pet' && (d.petDmg||d.petHit)) {
    const pp=[];
    if(d.petDmg)pp.push('傷害 '+sgn(d.petDmg));
    if(d.petHit)pp.push('命中 '+sgn(d.petHit));
    add('寵物加成', pp.join('、'));
  }
  Object.keys(STAT_LABEL).forEach(s => { if(d[s]) add(STAT_LABEL[s], sgn(d[s])); });
  if (d.mr) add('魔防', sgn(d.mr));
  if (d.mhp) add('HP上限', sgn(d.mhp));
  if (d.hpR) add('HP自然恢復', sgn(d.hpR));
  if (d.mmp) add('MP上限', sgn(d.mmp));
  if (d.mpR) add('MP自然恢復', sgn(d.mpR));
  Object.keys(RES_LABEL).forEach(s => { if(d[s]) add(RES_LABEL[s], sgn(d[s])); });
  if (d.block) add('格擋', d.block);
  if (d.weightCap) add('負重上限', sgn(d.weightCap));

  // per-enhance bonuses
  const enBon=[];
  if(d.mrPerEn) enBon.push('魔防 +'+d.mrPerEn);
  if(d.extraMpPerEn) enBon.push('額外MP +'+d.extraMpPerEn);
  if(d.meleeHitPerEn) enBon.push('近距命中 +'+d.meleeHitPerEn);
  if(d.rangedHit) enBon.push('遠距命中 +'+d.rangedHit);
  if(enBon.length) add('每強化+1', enBon.join('、'));

  // special traits
  const traits=[];
  if(d.immStone) traits.push('免疫石化');
  if(d.immPoison) traits.push('免疫中毒');
  if(d.stunResist) traits.push(d.stunResist+'% 抵抗暈眩');
  if(d.magicDrNonEle) traits.push('受無屬性魔法傷害 -'+d.magicDrNonEle+'%');
  if(traits.length) add('特殊特性', traits.join('、'));

  // spell proc
  if(d.spellProc) {
    const sp = d.spellProc;
    let spTxt = '攻擊時 '+(d.procRateBase||0)+'% 機率額外施放「'+esc(sp.skn||'')+'」';
    if(d.procRatePerEn) spTxt += '，每+1 發動率+'+d.procRatePerEn+'%';
    add('武器特效', spTxt);
  }

  // price
  if(d.p) add('定價', d.p.toLocaleString()+' 金幣（賣店約 '+(Math.floor(d.p*0.3)).toLocaleString()+'）');

  // element
  if(d.ele) add('屬性', ELE[d.ele]||d.ele);

  // description
  const descHTML = d.d ? '<div class="modal-desc">'+d.d+'</div>' : '';

  // search nav
  const idx = filteredKeys.indexOf(k);
  const navHTML = '<div class="search-nav">' +
    '<button id="prevBtn"' + (idx<=0?' disabled':'') + '>◀ 上一件</button>' +
    '<button id="nextBtn"' + (idx>=filteredKeys.length-1?' disabled':'') + '>下一件 ▶</button>' +
    '</div>';

  const favCls = isFav(k) ? 'fav-btn active' : 'fav-btn';
  const favChar = isFav(k) ? '❤' : '♡';
  document.getElementById('modalContent').innerHTML =
    '<div class="modal-head">' +
      '<div class="modal-icon">'+icon+'</div>' +
      '<div style="flex:1;min-width:0"><div class="modal-title">'+esc(d.n)+(d.legend?' <span class="card-legend">⭐ 傳說</span>':'')+'</div>' +
      '<div class="modal-id">'+esc(k)+'</div></div>' +
      '<button class="' + favCls + '" data-fav="' + esc(k) + '" id="modalFavBtn" title="加入最愛" style="font-size:22px">' + favChar + '</button>' +
      '<button class="modal-close" id="modalClose">✕</button>' +
    '</div>' +
    (rows.length ? '<table class="detail-table"><tbody>'+rows.join('')+'</tbody></table>' : '') +
    descHTML + navHTML;

  document.getElementById('modal').classList.add('open');

  // nav buttons
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const modalClose = document.getElementById('modalClose');
  const modalFavBtn = document.getElementById('modalFavBtn');
  if (prevBtn) prevBtn.onclick = () => { if(idx>0) showDetail(filteredKeys[idx-1]); };
  if (nextBtn) nextBtn.onclick = () => { if(idx<filteredKeys.length-1) showDetail(filteredKeys[idx+1]); };
  if (modalClose) modalClose.onclick = closeModal;
  if (modalFavBtn) modalFavBtn.onclick = () => { toggleFav(k); showDetail(k); };
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ===== EVENTS =====
document.getElementById('q').addEventListener('input', function() {
  searchQ = this.value.trim();
  document.getElementById('clearBtn').style.display = searchQ ? 'block' : 'none';
  applyFilter();
});
document.getElementById('clearBtn').addEventListener('click', function() {
  document.getElementById('q').value = '';
  searchQ = '';
  this.style.display = 'none';
  applyFilter();
  document.getElementById('q').focus();
});
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeType = btn.dataset.type;
  applyFilter();
});
document.getElementById('results').addEventListener('click', function(e) {
  const favBtn = e.target.closest('.fav-btn');
  if (favBtn) { e.stopPropagation(); toggleFav(favBtn.dataset.fav); return; }
  const card = e.target.closest('.card');
  if (card) showDetail(card.dataset.id);
});
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (document.getElementById('modal').classList.contains('open')) {
    const idx = filteredKeys.indexOf(currentModalKey);
    if (e.key === 'ArrowLeft' && idx > 0) showDetail(filteredKeys[idx-1]);
    if (e.key === 'ArrowRight' && idx < filteredKeys.length-1) showDetail(filteredKeys[idx+1]);
  }
});

// Track current modal key for arrow nav
let currentModalKey = '';
const origShowDetail = showDetail;
showDetail = function(k) { currentModalKey = k; origShowDetail(k); };

// Init
document.getElementById('clearBtn').style.display = 'none';
buildIndex();
</script>
</body>
</html>
